name: Notify Mobile After Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for production deployment
        run: sleep 120

      - name: Send mobile deployment notification
        env:
          DEPLOY_NOTIFY_SECRET: ${{ secrets.DEPLOY_NOTIFY_SECRET }}
          VERSION: ${{ github.sha }}
        run: |
          set -euo pipefail
          SHORT_VERSION="${VERSION:0:7}"
          BODY="$(SHORT_VERSION="${SHORT_VERSION}" node -e 'const v=process.env.SHORT_VERSION; process.stdout.write(JSON.stringify({title:"CpIPOS Mobile อัปเดตแล้ว",message:`ระบบอัปเดตเวอร์ชัน ${v} พร้อมใช้งาน`,version:v,url:"/sales"}))')"

          for attempt in 1 2 3; do
            echo "Sending deploy notification attempt ${attempt}"
            RESPONSE="$(curl --fail --silent --show-error \
              -X POST "https://sstiposmobile.vercel.app/api/system/notifications/deploy" \
              -H "Content-Type: application/json" \
              -H "x-deploy-notify-secret: ${DEPLOY_NOTIFY_SECRET}" \
              --data "${BODY}")"
            echo "${RESPONSE}"

            set +e
            RESPONSE="${RESPONSE}" node -e 'const p=JSON.parse(process.env.RESPONSE); const d=p.data || {}; if (d.configured === false) { console.error("Web Push is not configured on production"); process.exit(2); } if (Number(d.sent || 0) > 0) process.exit(0); console.error("No active subscribers received the deploy notification"); process.exit(1);'
            status=$?
            set -e

            if [ "$status" -eq 0 ]; then
              exit 0
            fi
            if [ "$status" -eq 2 ]; then
              exit 2
            fi
            sleep 30
          done

          echo "Deploy notification did not reach any active subscriber after retries" >&2
          exit 1
